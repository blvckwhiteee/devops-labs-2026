services:
  db:
    image: mariadb:11.8
    environment:
      MYSQL_DATABASE: mywebapp_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - lab1_internal

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint:
      - /app/mywebapp-migrate
    command:
      - -db=user:password@tcp(db:3306)/mywebapp_db?parseTime=true
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lab1_internal
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint:
      - /app/mywebapp-server
    command:
      - -host=0.0.0.0
      - -port=3000
      - -db=user:password@tcp(db:3306)/mywebapp_db?parseTime=true
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/bin/wget", "-qO-", "http://127.0.0.1:3000/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - lab1_internal

  nginx:
    image: nginx:1.29-alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./configs/nginx.compose.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lab1_internal

volumes:
  mariadb_data:

networks:
  lab1_internal:
    driver: bridge
