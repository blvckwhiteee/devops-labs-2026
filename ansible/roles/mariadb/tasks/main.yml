---
- name: Install MariaDB server and Python MySQL client
  ansible.builtin.apt:
    name:
      - mariadb-server
      - python3-pymysql
    state: present

- name: Deploy MariaDB network config (bind to host-only interface)
  ansible.builtin.template:
    src: 99-network.cnf.j2
    dest: /etc/mysql/mariadb.conf.d/99-network.cnf
    owner: root
    group: root
    mode: "0644"
  notify: Restart MariaDB

- name: Ensure MariaDB is enabled and started
  ansible.builtin.systemd:
    name: mariadb
    enabled: true
    state: started

- name: Flush handlers to apply network config before DB operations
  ansible.builtin.meta: flush_handlers

- name: Create application database
  community.mysql.mysql_db:
    name: "{{ db_name }}"
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock

- name: Create application DB user (access only from worker IP)
  community.mysql.mysql_user:
    name: "{{ db_user }}"
    host: "{{ hostvars['worker01']['ansible_host'] }}"
    password: "{{ db_password }}"
    priv: "{{ db_name }}.*:ALL"
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock
