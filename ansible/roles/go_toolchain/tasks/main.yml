---
- name: Check if Go {{ go_version }} is already installed
  ansible.builtin.stat:
    path: "{{ go_install_dir }}/bin/go"
  register: go_binary

- name: Get installed Go version
  ansible.builtin.command:
    cmd: "{{ go_install_dir }}/bin/go version"
  register: go_current_version
  changed_when: false
  when: go_binary.stat.exists

- name: Download and install Go {{ go_version }}
  ansible.builtin.unarchive:
    src: "{{ go_archive_url }}"
    dest: /usr/local
    remote_src: true
    extra_opts: [--strip-components=0]
    creates: "{{ go_install_dir }}/bin/go"

- name: Set Go PATH system-wide
  ansible.builtin.copy:
    dest: /etc/profile.d/go.sh
    content: |
      export GOROOT={{ go_install_dir }}
      export PATH=$PATH:{{ go_install_dir }}/bin
    mode: "0644"
