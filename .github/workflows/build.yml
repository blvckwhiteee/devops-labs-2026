name: Build

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Run only when CI passed, triggered by a push to main or a v*.*.* tag
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (github.event.workflow_run.head_branch == 'main' ||
       startsWith(github.event.workflow_run.head_branch, 'v'))
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
        run: |
          IMAGE="ghcr.io/$(echo "$REPO" | tr '[:upper:]' '[:lower:]')"

          if [[ "$BRANCH" == "main" ]]; then
            echo "tags=${IMAGE}:latest,${IMAGE}:sha-${SHA}" >> "$GITHUB_OUTPUT"
          else
            # Distinguish annotated tag (object type 'tag') from lightweight (object type 'commit')
            OBJ_TYPE=$(git cat-file -t "$BRANCH" 2>/dev/null || echo "unknown")
            if [[ "$OBJ_TYPE" == "tag" ]]; then
              echo "tags=${IMAGE}:stable,${IMAGE}:${BRANCH}" >> "$GITHUB_OUTPUT"
            else
              # Lightweight tag: publish under tag name but without 'stable'
              echo "tags=${IMAGE}:${BRANCH},${IMAGE}:sha-${SHA}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
