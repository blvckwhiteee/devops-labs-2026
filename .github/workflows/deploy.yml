name: Deploy

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]

jobs:
  deploy:
    name: Deploy to Target Node
    runs-on: [self-hosted, target-deployer]
    timeout-minutes: 15

    if: github.event.workflow_run.conclusion == 'success'

    env:
      TARGET_HOST: ${{ secrets.TARGET_HOST }}
      TARGET_USER: ${{ secrets.TARGET_USER }}

    steps:
      - name: Checkout code at commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      # Determine if this commit belongs to an annotated tag
      - name: Detect tag (if any)
        id: tag
        run: |
          TAG=$(git describe --exact-match --tags $(git rev-parse HEAD) 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "tag_found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No tag found for this commit. Skipping deploy."
          else
            echo "tag_found=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Found tag: $TAG"
          fi

      # Ensure only annotated tags (not lightweight)
      - name: Verify annotated tag
        if: steps.tag.outputs.tag_found == 'true'
        id: tag_check
        run: |
          OBJ_TYPE=$(git cat-file -t "${{ steps.tag.outputs.tag }}")

          echo "Tag object type: $OBJ_TYPE"

          if [ "$OBJ_TYPE" = "tag" ]; then
            echo "annotated=true" >> "$GITHUB_OUTPUT"
          else
            echo "annotated=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deploy - not an annotated tag"
          fi

      - name: Setup SSH key
        if: steps.tag_check.outputs.annotated == 'true'
        env:
          SSH_KEY_PATH: ${{ runner.temp }}/deploy_key
        run: |
          install -m 600 /dev/null "$SSH_KEY_PATH"
          printf '%s\n' "${{ secrets.TARGET_SSH_KEY }}" > "$SSH_KEY_PATH"
          echo "SSH_KEY_PATH=$SSH_KEY_PATH" >> $GITHUB_ENV

      - name: Compute image reference
        if: steps.tag_check.outputs.annotated == 'true'
        id: image
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          IMAGE="ghcr.io/$(echo "$REPO" | tr '[:upper:]' '[:lower:]'):${TAG}"
          echo "ref=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy
        if: steps.tag_check.outputs.annotated == 'true'
        env:
          APP_IMAGE: ${{ steps.image.outputs.ref }}
        run: bash scripts/deploy.sh

      - name: Verify deployment
        if: steps.tag_check.outputs.annotated == 'true'
        run: bash scripts/verify.sh

      - name: Cleanup SSH key
        if: always()
        run: rm -f "${{ runner.temp }}/deploy_key"
